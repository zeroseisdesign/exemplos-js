<!DOCTYPE html>
<html lang="gl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio 7</title>
    <link rel="stylesheet" href="assets/estilos.scss">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <form action="confirmacion.html" method="post">
        <div class="mb-3">
            <label for="nome" class="form-label">Nome:</label>
            <input type="text" class="form-control" id="nome" name="nome" minlength="3" required>

            <div class="invalid-feedback">
                Introduce un nome válido.
            </div>
        </div>
        <div class="mb-3">
            <label for="apelidos" class="form-label">Apelidos:</label>
            <input type="text" class="form-control" id="apelidos" name="apelidos" required>
            <div class="invalid-feedback">
                Introduce os dous apelidos.

            </div>
        </div>
        <div class="form-floating mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input type="email" class="form-control" id="email" placeholder="name@example.com">
            <div class="invalid-feedback">Introduce un correo electrónico válido.</div>
        </div>
        <div class="form-floating">
            <label for="contraseña" class="form-label">Contraseña:</label>
            <input type="contraseña" class="form-control" id="contraseña" minlength="8">
            <div class="invalid-feedback">A contraseña debe ter mínimo 8 caracteres.</div>
        </div>
        </div>

        <div class="mb-3">
            <label for="idade" class="form-label">Idade:</label>
            <input type="number" class="form-control" id="idade" name="idade" required>
            <div class="invalid-feedback">A idade debe estar entre 18 e 99 anos.</div>
        </div>

        <div class="mb-3">
            <label for="provincia" class="form-label">Provincia:</label>
            <select class="form-select" id="provincia" name="provincia" required>
                <option value="">Selecciona unha provincia</option>
                <option value="A Coruña">A Coruña</option>
                <option value="Lugo">Lugo</option>
                <option value="Ourense">Ourense</option>
                <option value="Pontevedra">Pontevedra</option>
            </select>
            <div class="invalid-feedback">Selecciona unha provincia válida.</div>
        </div>

        <div class="mb-3">
            <label class="form-label">Sexo:</label>
            <div>
                <input type="radio" class="form-check-input" name="sexo" id="sexoH" value="Home" required>
                <label class="form-check-label me-3" for="sexoH">Home</label>

                <input type="radio" class="form-check-input" name="sexo" id="sexoM" value="Muller" required>
                <label class="form-check-label" for="sexoM">Muller</label>
                <input type="radio" class="form-check-input" name="sexo" id="sexoO" value="Outro" required>
                <label class="form-check-label" for="sexoM">Outro</label>
            </div>
            <div class="invalid-feedback d-block">Selecciona unha opción.</div>
        </div>


        <div class="mb-3">
            <label class="form-label">Linguaxes favoritas:</label>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="js" value="JavaScript" name="linguaxes">
                <label class="form-check-label" for="js">JavaScript</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="php" value="PHP" name="linguaxes">
                <label class="form-check-label" for="php">PHP</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="python" value="Python" name="linguaxes">
                <label class="form-check-label" for="python">Python</label>
            </div>

            <div class="form-check">
                <input class="form-check-input" type="checkbox" id="java" value="Java" name="linguaxes">
                <label class="form-check-label" for="java">Java</label>
            </div>

            <div class="invalid-feedback d-block" id="errorLenguajes">
                Selecciona polo menos unha linguaxe

            </div>
            
</form>

                <button type="submit" class="btn btn-primary w-100">Enviar</button>
    </form>




    <script src="scripts/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
