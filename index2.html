<!DOCTYPE html>
<html lang="gl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú móbil - Exemplos JavaScript</title>
    <style>
        .nav-mobile {
            display: none;
            list-style: none;
            padding: 0;
            margin: 0.5rem 0;
            background: #f4f4f4;
            border: 1px solid #ccc;
            width: max-content;
        }

        .nav-mobile li {
            padding: 0.5rem 1rem;
            border-bottom: 1px solid #ddd;
        }

        .nav-mobile li:last-child {
            border-bottom: none;
        }

        .nav-mobile.visible {
            display: block;
        }

        #btnMenu.activo {
            background-color: #333;
            color: #fff;
        }
    </style>
</head>

<body>
    <h1>Menú móbil</h1>
    <button id="btnMenu">Menú</button>
    <ul class="nav-mobile">
        <li>Inicio</li>
        <li>Servizos</li>
        <li>Contacto</li>
    </ul>

    <script>
        let boton = document.getElementById("btnMenu");
        let menu = document.querySelector(".nav-mobile");

        boton.addEventListener("click", mostrar);

        function mostrar() {
            menu.classList.toggle("visible");
            boton.classList.toggle("activo");
        }
    </script>
</body>

</html>
